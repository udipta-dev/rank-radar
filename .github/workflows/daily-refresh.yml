name: Daily data refresh

on:
  schedule:
    # 02:00 UTC daily (~07:30 IST) — fresh data by morning
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pull in the trending-data branch so the aggregation step can read
      # all the 15-min snapshots from the last 30 days.
      - uses: actions/checkout@v4
        with:
          ref: trending-data
          path: trending-data-checkout

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install requests pandas pyarrow matplotlib

      - name: Scrape today's live snapshot (CMC current top-200)
        run: python scripts/scrape_daily.py

      - name: Scrape any new weekly historical snapshot (only Sundays add new data)
        run: python scripts/scrape_cmc_historical.py
        continue-on-error: true

      - name: Run analysis (combines weekly + daily)
        run: python scripts/analyze.py

      - name: Export web.json (incl. trending aggregates from trending-data branch)
        env:
          TRENDING_DIR: ${{ github.workspace }}/trending-data-checkout/data/trending
        run: python scripts/export_for_web.py

      - name: Generate AI insights (Gemini Flash)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_insights.py
        continue-on-error: true

      - name: Generate OG social-card image
        run: python scripts/generate_og.py
        continue-on-error: true

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ---- discoverability (only if we actually committed new data) ----

      - name: IndexNow ping (Bing / Yandex / DDG / Naver)
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        run: |
          KEY="c92e4172b31cd57a4cb22dcd14a42283"
          SITE="rank-radar-alpha.vercel.app"
          # Submit the main routes that change daily. Per-coin pages are picked
          # up via the sitemap; no point spamming 367 URLs at every refresh.
          curl -sS -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"${SITE}\",
              \"key\": \"${KEY}\",
              \"keyLocation\": \"https://${SITE}/${KEY}.txt\",
              \"urlList\": [
                \"https://${SITE}/\",
                \"https://${SITE}/movements\",
                \"https://${SITE}/quiet\",
                \"https://${SITE}/float\",
                \"https://${SITE}/trending\",
                \"https://${SITE}/narratives\",
                \"https://${SITE}/nfts\",
                \"https://${SITE}/charts\",
                \"https://${SITE}/notes\",
                \"https://${SITE}/sitemap.xml\"
              ]
            }" || echo "indexnow ping failed (non-fatal)"
          echo
          echo "IndexNow submitted"

      - name: Post to socials (Farcaster + Bluesky)
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        env:
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
          NEYNAR_SIGNER_UUID: ${{ secrets.NEYNAR_SIGNER_UUID }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python scripts/post_socials.py
