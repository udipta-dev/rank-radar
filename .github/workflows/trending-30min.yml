name: Trending capture + publish (every 30 min)

# Single workflow that does both the CG capture (commits to trending-data branch)
# AND the web.json refresh (commits to main → Vercel rebuild). One cron-job.org
# task drives the whole 30-min loop, no GH scheduler dependency.

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trending
  cancel-in-progress: false

jobs:
  capture-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: main-checkout

      - uses: actions/checkout@v4
        with:
          ref: trending-data
          path: trending-checkout

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests pandas pyarrow

      # ---- CAPTURE ----
      - name: Scrape CG trending into trending-data branch
        env:
          TRENDING_OUT_DIR: ${{ github.workspace }}/trending-checkout/data/trending
        run: python main-checkout/scripts/scrape_trending.py

      - name: Commit + push capture to trending-data
        working-directory: trending-checkout
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trending/
          if git diff --staged --quiet; then
            echo "No new capture data."
          else
            git commit -m "trending: $(date -u +%Y-%m-%dT%H:%MZ)"
            for i in 1 2 3; do
              if git push; then break; fi
              git pull --rebase --autostash
              sleep 2
            done
          fi

      # ---- PUBLISH ----
      - name: Recompute trending section of web.json on main
        working-directory: main-checkout
        env:
          TRENDING_DIR: ${{ github.workspace }}/trending-checkout/data/trending
        run: python scripts/refresh_trending.py

      - name: Commit + push web.json to main
        working-directory: main-checkout
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/web.json
          if git diff --staged --quiet; then
            echo "No web.json changes."
            exit 0
          fi
          git commit -m "trending: publish $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase --autostash
            sleep 2
          done
          echo "push failed after 3 attempts"
          exit 1
