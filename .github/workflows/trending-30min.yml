name: Trending capture (every 30 min)

# Captures CG trending list every 30 min into the trending-data branch.
# Driven primarily by cron-job.org with GH's own schedule as a backup.
# This commit DOES NOT trigger a Vercel rebuild (trending-data branch is
# ignored by Vercel via its own vercel.json).

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trending-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: main-checkout

      - uses: actions/checkout@v4
        with:
          ref: trending-data
          path: trending-checkout

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Scrape CG trending
        env:
          TRENDING_OUT_DIR: ${{ github.workspace }}/trending-checkout/data/trending
        run: python main-checkout/scripts/scrape_trending.py
        continue-on-error: true

      - name: Scrape CMC trending
        env:
          TRENDING_OUT_DIR: ${{ github.workspace }}/trending-checkout/data/trending
        run: python main-checkout/scripts/scrape_cmc_trending.py
        continue-on-error: true

      - name: Scrape Farcaster cashtag mentions
        env:
          TRENDING_OUT_DIR: ${{ github.workspace }}/trending-checkout/data/trending
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
        run: python main-checkout/scripts/scrape_farcaster.py
        continue-on-error: true

      # Reddit step removed: Reddit blocks every approach we tried from GH
      # Actions data-center IPs (including Scrapling + Camoufox stealth).
      # scripts/scrape_reddit.py still works from residential IPs and is
      # kept for manual / future use. UI tolerates the missing column.

      - name: Commit + push all captured sources to trending-data
        working-directory: trending-checkout
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data."
            exit 0
          fi
          git commit -m "trending: $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase --autostash
            sleep 2
          done
          echo "push failed after 3 attempts"
          exit 1
