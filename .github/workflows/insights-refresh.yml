name: Refresh AI insights (on-demand + intraday)

# Lightweight workflow: regenerates insights using the latest data without the
# heavy daily refresh (no CMC scrape, no analysis). Pulls trending-data so the
# trending section is recomputed from the freshest captures, runs Gemini,
# commits web.json.
#
# Two trigger modes:
#   - schedule (09:00 & 15:00 UTC = ~14:30 & 20:30 IST): intraday refresh of the
#     trending-driven insights only (home + trending). Combined with the daily
#     refresh at 02:00 UTC, that's 3 home/trending refreshes per day. movements
#     and narratives are left untouched intraday because their inputs (rank +
#     sector tables) only change once a day.
#   - workflow_dispatch: full regen of all four insights, anytime.

on:
  schedule:
    - cron: "0 9,15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: insights-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          ref: trending-data
          path: trending-data-checkout

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests pandas pyarrow

      - name: Refresh trending section first (so insights see fresh captures)
        env:
          TRENDING_DIR: ${{ github.workspace }}/trending-data-checkout/data/trending
        run: python scripts/refresh_trending.py
        continue-on-error: true

      - name: Generate AI insights (Gemini Flash)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Scheduled intraday runs refresh only the trending-driven insights
          # (home + trending). Manual dispatch leaves this empty = all four.
          INSIGHTS_ONLY: ${{ github.event_name == 'schedule' && 'home,trending' || '' }}
        run: python scripts/generate_insights.py

      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/web.json
          if git diff --staged --quiet; then
            echo "No changes to insights."
            exit 0
          fi
          git commit -m "insights: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase --autostash
            sleep 2
          done
          echo "push failed after 3 attempts"
          exit 1
