name: Trending capture (every 15 min)

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trending
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: trending-data

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Capture trending snapshot
        run: python scripts/scrape_trending.py

      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trending/
          if git diff --staged --quiet; then
            echo "No new data (snapshot may have failed or been duplicate)"
            exit 0
          fi
          git commit -m "trending: $(date -u +%Y-%m-%dT%H:%MZ)"
          # retry-on-conflict push: another run may have just finished
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            git pull --rebase --autostash
            sleep 2
          done
          echo "push failed after 3 attempts"
          exit 1
