name: Publish trending (every 30 min)

# Slim refresh that ONLY recomputes the trending section of web.json from the
# latest captures on the trending-data branch. Triggers a Vercel rebuild so
# /trending always reflects data within the last hour. CMC rank analysis is
# left alone (handled by the daily refresh — that data doesn't change intra-day).

on:
  schedule:
    - cron: "5,35 * * * *"   # 5 min after trending capture so captures land first
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trending-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          ref: trending-data
          path: trending-data-checkout

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pandas pyarrow

      - name: Refresh trending section of web.json
        env:
          TRENDING_DIR: ${{ github.workspace }}/trending-data-checkout/data/trending
        run: python scripts/refresh_trending.py

      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/web.json
          if git diff --staged --quiet; then
            echo "No trending changes."
            exit 0
          fi
          git commit -m "trending: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase --autostash
            sleep 2
          done
          echo "push failed after 3 attempts"
          exit 1
